# .github/workflows/kobo-sync.yml
# Automatically syncs KoboToolbox submissions to the dashboard
# Runs every 6 hours + manual trigger

name: Sync KoboToolbox Data

on:
  schedule:
    # Every 6 hours: midnight, 6am, noon, 6pm UTC
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Manual trigger from GitHub UI

permissions:
  contents: write  # Needed to push commits

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Configure git
        run: |
          git config user.name "CSIORS Bot"
          git config user.email "bot@csiors.org"

      - name: Run KoboToolbox sync
        env:
          KOBO_TOKEN: ${{ secrets.KOBO_TOKEN }}
          # v2 form UID: abcLY2v3kPakMtrmBisUsm
          KOBO_ASSET_ID: ${{ secrets.KOBO_ASSET_ID }}
        run: python kobo_sync.py --commit

      # Vercel auto-deploys on push — no extra step needed
